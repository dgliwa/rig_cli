name: sample-rig
description: Reference fixture for Mood + HX Stomp + MC6 setup
devices:
  - id: mood
    name: MOOD MKII
    type: digital
    config:
      type: chase_bliss
      midi_channel: 2
      model: Mood MkII
    presets:
      - id: preset-1
        name: Shimmer Delay
        preset_number: 1
        parameters:
          time: 72
          mix: 90
          length: 64
          wet_modify: 48
          clock: 64
          loop_modify: 32
          ramp_speed: 64
          wet_bypass: 127
          loop_bypass: 0

  - id: hx-stomp
    name: HX Stomp XL
    type: modeler
    config:
      type: midi
      midi_channel: 1
    presets:
      - id: lead
        name: Lead Tone
        preset_number: 5
        hlx_file: hlx/lead.hlx

  - id: mc6
    name: MC6
    type: controller
    config:
      type: controller
      midi_channel: 1
      scenes:
        lead:
          description: Lead tone with Mood shimmer delay
          presets:
            hx-stomp: lead
            mood: preset-1
          tags: [lead]
      banks:
        - bank: 1
          name: Bank 1
          switches:
            A:
              scene: lead
