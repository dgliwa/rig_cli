[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rig"
version = "0.1.0"
description = "Infrastructure-as-Code CLI for guitar rigs — core"
readme = "../../README.md"
requires-python = ">=3.12"
dependencies = [
    "typer>=0.12",
    "rich>=13.0",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "mido>=1.3",
    "python-rtmidi>=1.5",
]

[project.urls]
Homepage = "https://github.com/dgliwa/rig_cli"
Source = "https://github.com/dgliwa/rig_cli"

[project.scripts]
rig = "rig.cli:app"

[project.entry-points."rig.devices"]

[tool.hatch.build.targets.wheel]
packages = ["src/rig"]
