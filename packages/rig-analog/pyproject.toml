[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rig-analog"
version = "0.1.0"
description = "Analog (manual) device plugin for rig-cli"
requires-python = ">=3.12"
dependencies = ["rig"]

[project.entry-points."rig.devices"]
manual = "rig.engine.devices:AnalogDevice"

[tool.uv.sources]
rig = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/rig_analog"]
