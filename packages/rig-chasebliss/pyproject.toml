[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rig-chasebliss"
version = "0.1.0"
description = "Chase Bliss Audio device plugin for rig-cli"
requires-python = ">=3.12"
dependencies = ["rig"]

[project.entry-points."rig.devices"]
chase_bliss = "rig_chasebliss:register"

[tool.uv.sources]
rig = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/rig_chasebliss"]
