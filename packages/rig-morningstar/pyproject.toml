[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rig-morningstar"
version = "0.1.0"
description = "Morningstar MC6 controller plugin for rig-cli"
requires-python = ">=3.12"
dependencies = ["rig"]

[project.entry-points."rig.devices"]
controller = "rig_morningstar.device:MC6Device"

[tool.uv.sources]
rig = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/rig_morningstar"]
