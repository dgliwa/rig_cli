[tool.uv.workspace]
members = [
    "packages/rig",
    "packages/rig-analog",
    "packages/rig-chasebliss",
    "packages/rig-morningstar",
    "packages/rig-hx",
]

[tool.ruff]
line-length = 100
target-version = "py312"
src = [
    "packages/rig/src",
    "packages/rig-analog/src",
    "packages/rig-chasebliss/src",
    "packages/rig-morningstar/src",
    "packages/rig-hx/src",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort (import order)
    "UP",  # pyupgrade (3.12+ idioms)
]
ignore = [
    "E501",  # line-too-long — handled by ruff format
]

[tool.pytest.ini_options]
testpaths = ["packages"]
addopts = "--import-mode=importlib"

[dependency-groups]
dev = [
    "pytest",
    "pytest-cov",
    "ruff",
    "pre-commit>=4.6.0",
]
